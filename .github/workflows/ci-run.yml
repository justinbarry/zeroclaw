name: Build Head Artifact

on:
  push:
  workflow_dispatch:

concurrency:
  group: build-head-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  TARGET: x86_64-unknown-linux-gnu
  ARTIFACT_BASENAME: zeroclaw-x86_64-unknown-linux-gnu

jobs:
  build:
    name: Build Linux x86_64 Artifact
    runs-on: ubicloud-standard-30
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build current head
        run: cargo build --profile ci --locked --target "${TARGET}"

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${TARGET}/ci/zeroclaw" "dist/zeroclaw"
          tar -C dist -czf "dist/${ARTIFACT_BASENAME}-${GITHUB_SHA}.tar.gz" zeroclaw
          sha256sum "dist/${ARTIFACT_BASENAME}-${GITHUB_SHA}.tar.gz" > "dist/${ARTIFACT_BASENAME}-${GITHUB_SHA}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: ${{ env.ARTIFACT_BASENAME }}-${{ github.sha }}
          path: |
            dist/${{ env.ARTIFACT_BASENAME }}-${{ github.sha }}.tar.gz
            dist/${{ env.ARTIFACT_BASENAME }}-${{ github.sha }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Add run summary
        shell: bash
        run: |
          {
            echo "## Build Artifact"
            echo
            echo "- Target: \`${TARGET}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Artifact: \`${ARTIFACT_BASENAME}-${GITHUB_SHA}.tar.gz\`"
            echo "- Download: Actions run -> Artifacts"
          } >> "$GITHUB_STEP_SUMMARY"
