workspace_dir = "/zeroclaw-data/workspace"
config_path = "/zeroclaw-data/.zeroclaw/config.toml"
# This is the Ollama Base URL, not a secret key
api_key = "http://host.docker.internal:11434"
default_provider = "ollama"
default_model = "llama3.2"
default_temperature = 0.7

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true
require_pairing = false

# Linear integration
# Use env vars in production when possible:
#   export LINEAR_API_KEY='lin_api_...'
#   export LINEAR_WEBHOOK_SECRET='whsec_...'
#
# [linear]
# enabled = true
# webhook_enabled = true
# webhook_automation_enabled = true
# webhook_automation_agent = "project_manager"
# webhook_automation_events = ["Issue:create", "Issue:update", "Comment"]
# webhook_automation_issue_prefixes = ["JB"]
#
# [autonomy]
# always_ask = ["linear.write"]

